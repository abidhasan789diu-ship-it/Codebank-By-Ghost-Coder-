<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00f5ff;
      --neon-green: #39ff14;
      --neon-pink: #ff073a;
      --neon-purple: #bf5af2;
      --neon-amber: #ffb700;
      --bg-void: #020408;
      --bg-deep: #060c12;
      --bg-panel: #0a1420;
      --bg-card: #0d1a28;
      --bg-hover: #112030;
      --border-dim: rgba(0, 245, 255, 0.15);
      --border-glow: rgba(0, 245, 255, 0.5);
      --text-primary: #e8f4f8;
      --text-secondary: #8ab4c8;
      --text-dim: #4a6a7a;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.08) 2px, rgba(0, 0, 0, 0.08) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 24px;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0, 245, 255, 0.3);
      letter-spacing: 4px;
    }

    .logo span {
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--neon-green);
      background: rgba(57, 255, 20, 0.08);
      border: 1px solid rgba(57, 255, 20, 0.3);
      padding: 4px 12px;
      border-radius: 2px;
      text-shadow: 0 0 8px var(--neon-green);
    }

    /* BUTTONS */
    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      background: transparent;
    }

    .btn-cyan {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    .btn-cyan:hover {
      background: rgba(0, 245, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
    }

    .btn-green {
      border-color: var(--neon-green);
      color: var(--neon-green);
      text-shadow: 0 0 8px var(--neon-green);
    }

    .btn-green:hover {
      background: rgba(57, 255, 20, 0.1);
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
    }

    .btn-pink {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink);
    }

    .btn-pink:hover {
      background: rgba(255, 7, 58, 0.1);
      box-shadow: 0 0 20px rgba(255, 7, 58, 0.3);
    }

    .btn-amber {
      border-color: var(--neon-amber);
      color: var(--neon-amber);
      text-shadow: 0 0 8px var(--neon-amber);
    }

    .btn-amber:hover {
      background: rgba(255, 183, 0, 0.1);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 9px;
    }

    .btn-full {
      width: 100%;
      display: block;
      text-align: center;
    }

    /* NAV TABS */
    .nav-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-dim);
    }

    .nav-tab {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 18px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .nav-tab:hover {
      color: var(--text-secondary);
    }

    .nav-tab.active {
      color: var(--neon-cyan);
      border-bottom-color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    /* PANELS */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      padding: 24px;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      margin-bottom: 20px;
      position: relative;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 16px 16px 0;
      border-color: transparent var(--neon-cyan) transparent transparent;
      opacity: 0.4;
    }

    .panel-title {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 14px;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
    }

    /* INPUTS */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: all 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 245, 255, 0.15);
    }

    .field textarea {
      resize: vertical;
      min-height: 120px;
    }

    .field select {
      cursor: pointer;
    }

    .field select option {
      background: var(--bg-deep);
    }

    .field input[type="password"] {
      letter-spacing: 4px;
    }

    /* TWO-COL */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    /* AUTH SCREEN */
    .auth-screen {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      position: relative;
    }

    .auth-logo {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      color: var(--neon-cyan);
      text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0, 245, 255, 0.2);
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 6px;
    }

    .auth-logo span {
      color: var(--neon-pink);
      text-shadow: 0 0 30px var(--neon-pink);
    }

    .auth-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border: 1px solid var(--border-dim);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: rgba(0, 245, 255, 0.1);
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    /* SNIPPET CARDS */
    .snippet-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .snippet-card:hover {
      border-color: rgba(0, 245, 255, 0.4);
      background: var(--bg-hover);
    }

    .snippet-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .snippet-project {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--neon-cyan);
    }

    .snippet-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
    }

    .snippet-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 3px 8px;
      border: 1px solid;
      text-transform: uppercase;
    }

    .badge-lang {
      border-color: rgba(191, 90, 242, 0.4);
      color: var(--neon-purple);
      background: rgba(191, 90, 242, 0.08);
    }

    .badge-onetime {
      border-color: rgba(255, 7, 58, 0.4);
      color: var(--neon-pink);
      background: rgba(255, 7, 58, 0.08);
    }

    .badge-25min {
      border-color: rgba(255, 183, 0, 0.4);
      color: var(--neon-amber);
      background: rgba(255, 183, 0, 0.08);
    }

    .badge-infinite {
      border-color: rgba(57, 255, 20, 0.4);
      color: var(--neon-green);
      background: rgba(57, 255, 20, 0.08);
    }

    .badge-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* CODE VIEW */
    .code-display {
      background: var(--bg-void);
      border: 1px solid var(--border-dim);
      padding: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--neon-green);
      text-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
      overflow-x: auto;
      white-space: pre-wrap;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      margin-top: 12px;
    }

    /* SHARE LINK BOX */
    .share-link-box {
      background: rgba(0, 245, 255, 0.05);
      border: 1px solid rgba(0, 245, 255, 0.3);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .share-link-url {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--neon-cyan);
      word-break: break-all;
    }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      margin-bottom: 16px;
      border-left: 3px solid;
    }

    .alert-success {
      border-color: var(--neon-green);
      color: var(--neon-green);
      background: rgba(57, 255, 20, 0.05);
    }

    .alert-error {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      background: rgba(255, 7, 58, 0.05);
    }

    .alert-info {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      background: rgba(0, 245, 255, 0.05);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 4, 8, 0.92);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--neon-cyan);
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.2);
      padding: 28px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      position: relative;
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--neon-cyan);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-close {
      cursor: pointer;
      background: none;
      border: none;
      color: var(--neon-pink);
      font-size: 18px;
    }

    /* STAT ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      padding: 14px 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    .stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* USERS TABLE */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th,
    .data-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
    }

    .data-table th {
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .data-table td {
      color: var(--text-secondary);
    }

    .data-table tr:hover td {
      background: var(--bg-hover);
    }

    .online-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 6px currentColor;
    }

    .dot-green {
      background: var(--neon-green);
      color: var(--neon-green);
    }

    .dot-dim {
      background: var(--text-dim);
      color: var(--text-dim);
    }

    /* EDIT REQUEST */
    .edit-req {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .edit-req-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
    }

    .edit-req-user {
      color: var(--neon-cyan);
      font-size: 12px;
    }

    .edit-req-snippet {
      color: var(--text-dim);
      font-size: 10px;
      margin-top: 2px;
    }

    .edit-btn-row {
      display: flex;
      gap: 8px;
    }

    .platform-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .platform-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      padding: 3px 10px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 20px 0;
    }

    .mono {
      font-family: 'Share Tech Mono', monospace;
    }

    .corner-tl {
      position: absolute;
      top: -1px;
      left: -1px;
      width: 12px;
      height: 12px;
      border-top: 2px solid var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }

    .corner-br {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 12px;
      height: 12px;
      border-bottom: 2px solid var(--neon-cyan);
      border-right: 2px solid var(--neon-cyan);
    }
  </style>
</head>

      newSnippet: { projectName: '', description: '', language: 'python', expiryType: 'infinite', code: '' },
      shareResult: null,
      viewSnippetId: '',
      viewedSnippet: null,
      editReqMsg: ''
    };

    function setState(patch) {
      Object.assign(STATE, patch);
      render();
    }

    function showAlert(type, msg) {
      setState({ alert: { type, msg } });
      setTimeout(() => setState({ alert: null }), 3500);
    }

    function getSnippetsByUser(uid) {
      return DB.snippets.filter(s => s.ownerId === uid);
    }

    function handleLogin() {
      const { username, password } = STATE.loginForm;
      const user = DB.users.find(u => u.username === username && u.password === password);
      if (!user) { showAlert('error', '[ACCESS DENIED] Invalid credentials'); return; }
      setState({ currentUser: user, view: 'app', activeTab: 'dashboard', alert: null });
    }

    function handleRegister() {
      const { username, password, confirm } = STATE.registerForm;

      if (!username || !password) {
        showAlert('error', '[ERROR] Username and password required');
        return;
      }

      if (password !== confirm) {
        showAlert('error', '[ERROR] Passwords do not match');
        return;
      }

      if (DB.users.find(u => u.username === username)) {
        showAlert('error', '[ERROR] Username already exists');
        return;
      }

      const user = {
        id: 'USR-' + genId(),
        username,
        password,
        created: now(),
        role: 'user'
      };

      DB.users.push(user);
      db.collection("users").doc(user.id).set(user);
      saveDB();

      setState({
        currentUser: user,
        view: 'app',
        activeTab: 'dashboard',
        alert: null
      });
    }

    function handleCreateSnippet() {
      const { projectName, description, language, expiryType, code } = STATE.newSnippet;
      if (!projectName || !code) { showAlert('error', '[ERROR] Project name and code required'); return; }
      const id = genUUID();
      const snippet = {
        id, projectName, description, language, expiryType, code,
        ownerId: STATE.currentUser.id,
        created: now(),
        accessed: 0,
        editRequests: [],
        expiresAt: expiryType === '25min' ? now() + 25 * 60 * 1000 : null
      };
      DB.snippets.push(snippet);
      saveDB();
      const shareUrl = `${window.location.origin}/s/${id}`;
      setState({ shareResult: { id, url: shareUrl, expiryType }, newSnippet: { projectName: '', description: '', language: 'python', expiryType: 'infinite', code: '' } });
      showAlert('success', '[SUCCESS] Snippet encrypted and uploaded to the grid');
    }

    function handleViewSnippet() {
      const id = STATE.viewSnippetId.trim().toUpperCase();
      const snippet = DB.snippets.find(s => s.id === id);
      if (!snippet) { showAlert('error', '[404] Snippet not found on the grid'); setState({ viewedSnippet: null }); return; }
      if (snippet.expiryType === '25min' && snippet.expiresAt && now() > snippet.expiresAt) {
        showAlert('error', '[EXPIRED] This snippet has been purged from memory'); setState({ viewedSnippet: null }); return;
      }
      if (snippet.expiryType === 'one-time' && snippet.accessed > 0 && snippet.ownerId !== STATE.currentUser.id) {
        showAlert('error', '[DESTROYED] One-time snippet already accessed. Data wiped.'); setState({ viewedSnippet: null }); return;
      }
      if (snippet.ownerId !== STATE.currentUser.id) snippet.accessed++;
      saveDB();
      setState({ viewedSnippet: snippet });
    }

    function handleEditRequest(snippetId) {
      const snippet = DB.snippets.find(s => s.id === snippetId);
      if (!snippet) return;
      if (!STATE.editReqMsg.trim()) { showAlert('error', '[ERROR] Request message required'); return; }
      snippet.editRequests.push({
        from: STATE.currentUser.id,
        fromName: STATE.currentUser.username,
        msg: STATE.editReqMsg,
        time: now()
      });
      saveDB();
      showAlert('success', '[SENT] Edit permission request transmitted');
      setState({ modal: null, editReqMsg: '' });
    }

    function handleApproveEdit(snippetId, reqIdx) {
      const snippet = DB.snippets.find(s => s.id === snippetId);
      if (snippet) snippet.editRequests.splice(reqIdx, 1);
      saveDB();
      showAlert('success', '[GRANTED] Edit access approved');
      render();
    }

    function copyToClipboard(text) {
      navigator.clipboard?.writeText(text).catch(() => { });
      showAlert('success', '[COPIED] Data copied to buffer');
    }

    function formatTime(ts) {
      const d = now() - ts;
      if (d < 60000) return 'just now';
      if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
      if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
      return Math.floor(d / 86400000) + 'd ago';
    }

    function getBadgeClass(expiryType) {
      return 'badge badge-' + (expiryType === 'one-time' ? 'onetime' : expiryType);
    }
    function getExpiryLabel(et) {
      return et === 'one-time' ? '🔥 ONE-TIME' : et === '25min' ? '⚡ 25MIN' : '∞ INFINITE';
    }

    function renderAlert() {
      if (!STATE.alert) return '';
      return `<div class="alert alert-${STATE.alert.type}" style="margin-bottom:16px">${STATE.alert.msg}</div>`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function renderApp() {
      const tabs = [
        { id: 'dashboard', label: 'DASHBOARD' },
        { id: 'create', label: 'NEW SNIPPET' },
        { id: 'viewer', label: 'VIEW CODE' },
        ...(STATE.currentUser.role === 'admin' ? [{ id: 'users', label: 'USER CONTROL' }] : [])
      ];
      let content = '';
      if (STATE.activeTab === 'dashboard') content = renderDashboard();
      else if (STATE.activeTab === 'create') content = renderCreate();
      else if (STATE.activeTab === 'viewer') content = renderViewer();
      else if (STATE.activeTab === 'users') content = renderUsers();

      return `
    ${renderModal()}
    <div class="header">
      <div class="logo">CODE<span>789</span></div>
      <div class="header-right">
        <div class="platform-row">
          <span class="platform-badge">WEB</span>
          <span class="platform-badge">ANDROID</span>
          <span class="platform-badge">MacOS</span>
        </div>
        <div class="user-badge">// ${STATE.currentUser.username} · ${STATE.currentUser.role.toUpperCase()}</div>
        <button class="btn btn-pink btn-sm" onclick="setState({view:'auth',currentUser:null,viewedSnippet:null,shareResult:null})">LOGOUT</button>
      </div>
    </div>
    <div class="nav-tabs">
      ${tabs.map(t => `<button class="nav-tab ${STATE.activeTab === t.id ? 'active' : ''}" onclick="setState({activeTab:'${t.id}',shareResult:null,viewedSnippet:null,alert:null})">${t.label}</button>`).join('')}
    </div>
    ${content}
  `;
    }

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = STATE.view === 'auth' ? renderAuth() : renderApp();
    }

    document.addEventListener('contextmenu', e => {
      const el = e.target.closest('.code-display');
      if (el) e.preventDefault();
    });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && ['p', 's'].includes(e.key.toLowerCase())) {
        const el = document.querySelector('.code-display');
        if (el) e.preventDefault();
      }
    });

    render();
  </script>
</body>

</html>
